<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada do Estudante: O Jogo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent1: #3b82f6; /* Azul */
            --accent2: #10b981; /* Verde */
            --accent3: #f59e0b; /* Amarelo */
            --danger: #ef4444; /* Vermelho */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            color: var(--accent1);
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .stat-icon { font-size: 1.5rem; margin-bottom: 5px; }
        
        .stat-value { transition: color 0.3s; }
        .up { color: var(--accent2); animation: pop 0.3s; }
        .down { color: var(--danger); animation: pop 0.3s; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .scenario-box {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.4;
            border-left: 4px solid var(--accent3);
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            font-family: 'Poppins', sans-serif;
            background: var(--accent1);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        /* Cores dos botões corrigidas */
        .btn-good { background: var(--accent2); }
        .btn-good:hover { background: #059669; }
        
        .btn-bad { background: #475569; }
        .btn-bad:hover { background: var(--danger); }

        .progress {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            letter-spacing: 2px;
        }

        .win-screen {
            background: linear-gradient(135deg, var(--accent2), #059669);
            color: white;
        }
        .lose-screen {
            background: linear-gradient(135deg, var(--danger), #991b1b);
            color: white;
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="game-board">
        <h1>Simulador de Futuro</h1>
        
        <div class="stats-container">
            <div class="stat">
                <span class="stat-icon">🧠</span>
                <span>XP</span>
                <span class="stat-value" id="val-xp">20</span>
            </div>
            <div class="stat">
                <span class="stat-icon">🚀</span>
                <span>Futuro</span>
                <span class="stat-value" id="val-futuro">30</span>
            </div>
            <div class="stat">
                <span class="stat-icon">⚡</span>
                <span>Energia</span>
                <span class="stat-value" id="val-energia">100</span>
            </div>
        </div>

        <div class="scenario-box" id="scenario-text">
            Sua jornada começa agora. Você tem 5 semanas decisivas pela frente. Preparado?
        </div>

        <div class="choices" id="choices-container">
            <button id="btn-iniciar">Começar o Jogo</button>
        </div>

        <div class="progress" id="progress-text"></div>
    </div>

    <script>
        // Status Iniciais
        let xp = 20;
        let futuro = 30;
        let energia = 100;
        let rodadaAtual = 0;

        // Cenários do Jogo
        const cenarios = [
            {
                texto: "Semana 1: Choveu muito e está um frio terrível. A cama está quentinha.",
                opcoes: [
                    { texto: "Levantar e encarar a chuva! (Ir à escola)", xp: 15, futuro: 15, energia: -20, cor: "btn-good" },
                    { texto: "Ficar dormindo... zZZz (Faltar)", xp: -5, futuro: -10, energia: 20, cor: "btn-bad" }
                ]
            },
            {
                texto: "Semana 2: Hoje tem apresentação daquele trabalho em grupo que vale metade da nota.",
                opcoes: [
                    { texto: "Apresentar e salvar o grupo!", xp: 25, futuro: 20, energia: -25, cor: "btn-good" },
                    { texto: "Fingir dor de barriga e faltar.", xp: -20, futuro: -25, energia: 10, cor: "btn-bad" }
                ]
            },
            {
                texto: "Semana 3: Lançou a nova temporada da sua série favorita de madrugada.",
                opcoes: [
                    { texto: "Ir pra escola com sono, mas focado.", xp: 15, futuro: 10, energia: -30, cor: "btn-good" },
                    { texto: "Faltar para maratonar a série no sofá.", xp: -10, futuro: -15, energia: 30, cor: "btn-bad" }
                ]
            },
            {
                texto: "Semana 4: Um professor ofereceu aula de reforço hoje.",
                opcoes: [
                    { texto: "Participar para tentar entender a matéria.", xp: 30, futuro: 20, energia: -30, cor: "btn-good" },
                    { texto: "Ir embora mais cedo jogar videogame.", xp: -15, futuro: -10, energia: 20, cor: "btn-bad" }
                ]
            },
            {
                texto: "Semana 5: Feira de profissões na escola com pessoas do mercado de trabalho.",
                opcoes: [
                    { texto: "Fazer contatos e pensar no futuro.", xp: 20, futuro: 35, energia: -20, cor: "btn-good" },
                    { texto: "Matar aula para ir no shopping com amigos.", xp: -10, futuro: -30, energia: 15, cor: "btn-bad" }
                ]
            }
        ];

        // Elementos DOM
        const elXp = document.getElementById('val-xp');
        const elFuturo = document.getElementById('val-futuro');
        const elEnergia = document.getElementById('val-energia');
        const elScenario = document.getElementById('scenario-text');
        const elChoices = document.getElementById('choices-container');
        const elProgress = document.getElementById('progress-text');
        const elBoard = document.getElementById('game-board');
        const btnIniciar = document.getElementById('btn-iniciar');

        function atualizarDisplay(diffXp, diffFuturo, diffEnergia) {
            const animar = (el, diff) => {
                if(diff === 0) return;
                el.classList.remove('up', 'down');
                void el.offsetWidth; // Força o navegador a reiniciar a animação
                el.classList.add(diff > 0 ? 'up' : 'down');
            };

            animar(elXp, diffXp);
            animar(elFuturo, diffFuturo);
            animar(elEnergia, diffEnergia);

            elXp.innerText = Math.max(0, Math.min(100, xp));
            elFuturo.innerText = Math.max(0, Math.min(100, futuro));
            elEnergia.innerText = Math.max(0, Math.min(100, energia));
        }

        function fazerEscolha(idxCenario, idxEscolha) {
            const escolha = cenarios[idxCenario].opcoes[idxEscolha];
            
            xp += escolha.xp;
            futuro += escolha.futuro;
            energia += escolha.energia;

            if (xp > 100) xp = 100; if (xp < 0) xp = 0;
            if (futuro > 100) futuro = 100; if (futuro < 0) futuro = 0;
            if (energia > 100) energia = 100; if (energia < 0) energia = 0;

            atualizarDisplay(escolha.xp, escolha.futuro, escolha.energia);
            
            rodadaAtual++;
            
            if (rodadaAtual < cenarios.length) {
                renderizarCenario();
            } else {
                finalizarJogo();
            }
        }

        function renderizarCenario() {
            const cenario = cenarios[rodadaAtual];
